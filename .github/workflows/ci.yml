name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Go and contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          # Runtime code has no modules to download and therefore no go.sum.
          cache: false
      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.21.3
      - name: Verify
        run: make check

  images:
    name: Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - control-plane
          - virtual-key-control-plane
          - admin-webui
          - openai-gateway
          - openai-responses-gateway
          - anthropic-gateway
          - gemini-gateway
          - openai-chat-adapter
          - openai-responses-adapter
          - anthropic-adapter
          - gemini-adapter
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build --build-arg SERVICE=${{ matrix.service }} -t gwai-${{ matrix.service }}:ci .
