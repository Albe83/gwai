providerAdapters:
  - name: team-a
    kind: anthropic
    appID: gwai-anthropic-team-a
    image: {repository: gwai-anthropic-adapter}
    replicas: 2
    port: 8080
    maxBodyBytes: 10485760
    providerTimeout: 5m
    defaultMaxOutputTokens: 4096
    maxOutputTokens: 8192
    upstream:
      baseURL: https://api.anthropic.com
      apiVersion: 2023-06-01
      secretRef: {store: kubernetes, name: anthropic-team-a, key: api-key, namespace: ""}
    resources: &adapterResources
      requests: {cpu: 50m, memory: 64Mi}
      limits: {cpu: "1", memory: 512Mi}
  - name: team-b
    kind: openai-chat
    appID: gwai-openai-chat-team-b
    image: {repository: gwai-openai-chat-adapter}
    replicas: 1
    port: 8080
    maxBodyBytes: 10485760
    providerTimeout: 5m
    upstream:
      baseURL: https://api.openai.com
      apiVersion: v1
      secretRef: {store: kubernetes, name: openai-team-b, key: api-key, namespace: ""}
    resources: *adapterResources
  - name: team-c
    kind: openai-responses
    appID: gwai-openai-responses-team-c
    image: {repository: gwai-openai-responses-adapter}
    replicas: 1
    port: 8080
    maxBodyBytes: 10485760
    providerTimeout: 5m
    upstream:
      baseURL: https://api.openai.com
      apiVersion: v1
      secretRef: {store: kubernetes, name: openai-team-c, key: api-key, namespace: ""}
    resources: *adapterResources
  - name: team-d
    kind: gemini
    appID: gwai-gemini-team-d
    image: {repository: gwai-gemini-adapter}
    replicas: 1
    port: 8080
    maxBodyBytes: 10485760
    providerTimeout: 5m
    upstream:
      baseURL: https://generativelanguage.googleapis.com
      apiVersion: v1beta
      secretRef: {store: kubernetes, name: gemini-team-d, key: api-key, namespace: ""}
    resources: *adapterResources
