{{- $root := . -}}
{{- range $index, $gateway := .Values.gateways }}
{{- if $index }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gwai.gatewayName" (dict "root" $root "gateway" $gateway) }}
  labels:
    {{- include "gwai.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $gateway.name | quote }}
spec:
  replicas: {{ $gateway.replicas }}
  selector:
    matchLabels:
      {{- include "gwai.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: {{ $gateway.name | quote }}
  template:
    metadata:
      labels:
        {{- include "gwai.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ $gateway.name | quote }}
      annotations:
        checksum/dapr-token-secrets: {{ include (print $root.Template.BasePath "/dapr-token-secrets.yaml") $root | sha256sum }}
        {{- if $root.Values.dapr.enabled }}
        dapr.io/enabled: "true"
        dapr.io/app-id: {{ include "gwai.gatewayName" (dict "root" $root "gateway" $gateway) }}
        dapr.io/app-port: {{ $gateway.port | quote }}
        dapr.io/app-protocol: http
        dapr.io/config: {{ include "gwai.gatewayName" (dict "root" $root "gateway" $gateway) }}
        dapr.io/log-level: {{ $root.Values.dapr.logLevel | quote }}
        dapr.io/log-as-json: "true"
        dapr.io/enable-api-logging: {{ $root.Values.dapr.apiLogging | quote }}
        dapr.io/disable-builtin-k8s-secret-store: "true"
        dapr.io/max-body-size: "16Mi"
        dapr.io/api-token-secret: {{ include "gwai.daprAPISecretName" $root }}
        {{- end }}
        {{- with $root.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "gwai.serviceAccountName" $root }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ $gateway.name }}
          image: {{ include "gwai.image" (dict "root" $root "repository" $gateway.image.repository) }}
          imagePullPolicy: {{ $root.Values.global.image.pullPolicy }}
          env:
            - name: PORT
              value: {{ $gateway.port | quote }}
            - name: GWAI_STATE_STORE
              value: {{ $root.Values.dapr.stateStoreName | quote }}
            - name: GWAI_MAX_BODY_BYTES
              value: {{ int64 $gateway.maxBodyBytes | quote }}
            - name: GWAI_REQUEST_TIMEOUT
              value: {{ $gateway.requestTimeout | quote }}
            - name: DAPR_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "gwai.daprAPISecretName" $root }}
                  key: token
          ports:
            - name: http
              containerPort: {{ $gateway.port }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml $gateway.resources | nindent 12 }}
      {{- with $root.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gwai.gatewayName" (dict "root" $root "gateway" $gateway) }}
  labels:
    {{- include "gwai.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $gateway.name | quote }}
spec:
  type: {{ $gateway.service.type }}
  selector:
    {{- include "gwai.selectorLabels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $gateway.name | quote }}
  ports:
    - name: http
      port: {{ $gateway.service.port }}
      targetPort: http
{{- end }}
