{{- if not .Values.dapr.enabled }}
{{- fail "dapr.enabled=false is unsupported because gwai requires Dapr building blocks" }}
{{- end }}
{{- $stateStoreNames := dict }}
{{- $stateStoreDBs := dict }}
{{- range $domain, $store := .Values.dapr.stateStores }}
{{- if not (regexMatch "^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$" $store.name) }}
{{- fail (printf "dapr.stateStores.%s.name must be a lowercase DNS label" $domain) }}
{{- end }}
{{- if hasKey $stateStoreNames $store.name }}
{{- fail (printf "dapr.stateStores.%s.name must be unique" $domain) }}
{{- end }}
{{- $_ := set $stateStoreNames $store.name true }}
{{- $dbValue := toString $store.redisDB }}
{{- if not (regexMatch "^[0-9]+$" $dbValue) }}
{{- fail (printf "dapr.stateStores.%s.redisDB must be a non-negative integer" $domain) }}
{{- end }}
{{- $db := toString (int $store.redisDB) }}
{{- if and $.Values.valkey.enabled (ge (int $store.redisDB) (int $.Values.valkey.databases)) }}
{{- fail (printf "dapr.stateStores.%s.redisDB must be lower than valkey.databases" $domain) }}
{{- end }}
{{- if hasKey $stateStoreDBs $db }}
{{- fail (printf "dapr.stateStores.%s.redisDB must be unique" $domain) }}
{{- end }}
{{- $_ := set $stateStoreDBs $db true }}
{{- end }}
{{- if and .Values.valkey.enabled (le (int .Values.valkey.databases) 0) }}
{{- fail "valkey.databases must be positive" }}
{{- end }}
{{- if and .Values.valkey.enabled .Values.valkey.tls.enabled }}
{{- fail "valkey.tls.enabled is only supported for an external Valkey endpoint (valkey.enabled=false)" }}
{{- end }}
{{- if not .Values.images.controlPlane.repository }}
{{- fail "images.controlPlane.repository is required" }}
{{- end }}
{{- if ne (int .Values.controlPlane.replicas) 1 }}
{{- fail "controlPlane.replicas must remain 1 until distributed uniqueness locking is implemented" }}
{{- end }}
{{- if or (le (int .Values.controlPlane.port) 0) (le (int64 .Values.controlPlane.maxBodyBytes) 0) }}
{{- fail "controlPlane port and maxBodyBytes must be positive" }}
{{- end }}
{{- if not .Values.images.virtualKeyControlPlane.repository }}
{{- fail "images.virtualKeyControlPlane.repository is required" }}
{{- end }}
{{- if ne (int .Values.virtualKeyControlPlane.replicas) 1 }}
{{- fail "virtualKeyControlPlane.replicas must remain 1 until distributed uniqueness locking is implemented" }}
{{- end }}
{{- if or (le (int .Values.virtualKeyControlPlane.port) 0) (le (int64 .Values.virtualKeyControlPlane.maxBodyBytes) 0) }}
{{- fail "virtualKeyControlPlane port and maxBodyBytes must be positive" }}
{{- end }}
{{- if not .Values.images.adminWebUI.repository }}
{{- fail "images.adminWebUI.repository is required" }}
{{- end }}
{{- if ne (int .Values.adminWebUI.replicas) 1 }}
{{- fail "adminWebUI.replicas must remain 1" }}
{{- end }}
{{- if or (le (int .Values.adminWebUI.port) 0) (gt (int .Values.adminWebUI.port) 65535) (le (int64 .Values.adminWebUI.maxBodyBytes) 0) (le (int .Values.adminWebUI.service.port) 0) (gt (int .Values.adminWebUI.service.port) 65535) }}
{{- fail "adminWebUI ports must be between 1 and 65535 and maxBodyBytes must be positive" }}
{{- end }}
{{- if ne .Values.adminWebUI.service.type "ClusterIP" }}
{{- fail "adminWebUI.service.type must remain ClusterIP; use an authenticated TLS ingress for external exposure" }}
{{- end }}
{{- if or (lt (int .Values.adminWebUI.sessionTTLSeconds) 300) (gt (int .Values.adminWebUI.sessionTTLSeconds) 86400) }}
{{- fail "adminWebUI.sessionTTLSeconds must be between 300 and 86400" }}
{{- end }}
{{- if or (lt (int .Values.adminWebUI.requestTimeoutSeconds) 1) (gt (int .Values.adminWebUI.requestTimeoutSeconds) 120) }}
{{- fail "adminWebUI.requestTimeoutSeconds must be between 1 and 120" }}
{{- end }}
{{- if lt (int .Values.adminWebUI.terminationGracePeriodSeconds) (add (int .Values.adminWebUI.requestTimeoutSeconds) 10) }}
{{- fail "adminWebUI.terminationGracePeriodSeconds must be at least requestTimeoutSeconds + 10" }}
{{- end }}
{{- if not (kindIs "bool" .Values.adminWebUI.secureCookies) }}
{{- fail "adminWebUI.secureCookies must be a boolean" }}
{{- end }}
{{- if not (kindIs "bool" .Values.adminWebUI.httpRoute.enabled) }}
{{- fail "adminWebUI.httpRoute.enabled must be a boolean" }}
{{- end }}
{{- if .Values.adminWebUI.httpRoute.enabled }}
{{- $dnsSubdomainPattern := "^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$" }}
{{- $dnsLabelPattern := "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$" }}
{{- $hostnamePattern := "^(\\*\\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$" }}
{{- if not .Values.adminWebUI.secureCookies }}
{{- fail "adminWebUI.secureCookies must be true when adminWebUI.httpRoute.enabled=true" }}
{{- end }}
{{- if not (kindIs "map" .Values.adminWebUI.httpRoute.annotations) }}
{{- fail "adminWebUI.httpRoute.annotations must be a map" }}
{{- end }}
{{- range $key, $value := .Values.adminWebUI.httpRoute.annotations }}
{{- if not (kindIs "string" $value) }}
{{- fail (printf "adminWebUI.httpRoute.annotations[%s] must be a string" $key) }}
{{- end }}
{{- end }}
{{- if not (kindIs "slice" .Values.adminWebUI.httpRoute.parentRefs) }}
{{- fail "adminWebUI.httpRoute.parentRefs must be a list" }}
{{- end }}
{{- if eq (len .Values.adminWebUI.httpRoute.parentRefs) 0 }}
{{- fail "adminWebUI.httpRoute.parentRefs must contain at least one Gateway when the HTTPRoute is enabled" }}
{{- end }}
{{- if gt (len .Values.adminWebUI.httpRoute.parentRefs) 32 }}
{{- fail "adminWebUI.httpRoute.parentRefs must contain at most 32 Gateways" }}
{{- end }}
{{- $parentRefs := dict }}
{{- range $index, $parent := .Values.adminWebUI.httpRoute.parentRefs }}
{{- if not (kindIs "map" $parent) }}
{{- fail (printf "adminWebUI.httpRoute.parentRefs[%d] must be a map" $index) }}
{{- end }}
{{- if or (not (hasKey $parent "name")) (not (kindIs "string" $parent.name)) (not $parent.name) }}
{{- fail (printf "adminWebUI.httpRoute.parentRefs[%d].name is required" $index) }}
{{- end }}
{{- if or (gt (len $parent.name) 253) (not (regexMatch $dnsSubdomainPattern $parent.name)) }}
{{- fail (printf "adminWebUI.httpRoute.parentRefs[%d].name must be a valid DNS subdomain no longer than 253 characters" $index) }}
{{- end }}
{{- if hasKey $parent "namespace" }}
{{- if not (kindIs "string" $parent.namespace) }}
{{- fail (printf "adminWebUI.httpRoute.parentRefs[%d].namespace must be a string" $index) }}
{{- end }}
{{- if and $parent.namespace (or (gt (len $parent.namespace) 63) (not (regexMatch $dnsLabelPattern $parent.namespace))) }}
{{- fail (printf "adminWebUI.httpRoute.parentRefs[%d].namespace must be empty or a valid DNS label no longer than 63 characters" $index) }}
{{- end }}
{{- end }}
{{- if or (not (hasKey $parent "sectionName")) (not (kindIs "string" $parent.sectionName)) (not $parent.sectionName) }}
{{- fail (printf "adminWebUI.httpRoute.parentRefs[%d].sectionName must select an HTTPS Gateway listener" $index) }}
{{- end }}
{{- if or (gt (len $parent.sectionName) 253) (not (regexMatch $dnsSubdomainPattern $parent.sectionName)) }}
{{- fail (printf "adminWebUI.httpRoute.parentRefs[%d].sectionName must be a valid Gateway API section name no longer than 253 characters" $index) }}
{{- end }}
{{- if hasKey $parent "port" }}
{{- fail (printf "adminWebUI.httpRoute.parentRefs[%d].port is unsupported; select the HTTPS listener by sectionName" $index) }}
{{- end }}
{{- $parentNamespace := default $.Release.Namespace $parent.namespace }}
{{- $parentKey := printf "%s/%s/%s" $parentNamespace $parent.name $parent.sectionName }}
{{- if hasKey $parentRefs $parentKey }}
{{- fail (printf "adminWebUI.httpRoute.parentRefs[%d] duplicates Gateway listener %s" $index $parentKey) }}
{{- end }}
{{- $_ := set $parentRefs $parentKey true }}
{{- end }}
{{- if not (kindIs "slice" .Values.adminWebUI.httpRoute.hostnames) }}
{{- fail "adminWebUI.httpRoute.hostnames must be a list" }}
{{- end }}
{{- if eq (len .Values.adminWebUI.httpRoute.hostnames) 0 }}
{{- fail "adminWebUI.httpRoute.hostnames must contain at least one administrative hostname when the HTTPRoute is enabled" }}
{{- end }}
{{- if gt (len .Values.adminWebUI.httpRoute.hostnames) 16 }}
{{- fail "adminWebUI.httpRoute.hostnames must contain at most 16 entries" }}
{{- end }}
{{- $hostnames := dict }}
{{- range $index, $hostname := .Values.adminWebUI.httpRoute.hostnames }}
{{- if or (not (kindIs "string" $hostname)) (not $hostname) (gt (len $hostname) 253) (not (regexMatch $hostnamePattern $hostname)) }}
{{- fail (printf "adminWebUI.httpRoute.hostnames[%d] must be a valid lowercase DNS hostname, optionally prefixed by '*.', no longer than 253 characters" $index) }}
{{- end }}
{{- if hasKey $hostnames $hostname }}
{{- fail (printf "adminWebUI.httpRoute.hostnames[%d] duplicates hostname %s" $index $hostname) }}
{{- end }}
{{- $_ := set $hostnames $hostname true }}
{{- end }}
{{- end }}
{{- if eq (len .Values.gateways) 0 }}
{{- fail "at least one gateways entry is required" }}
{{- end }}
{{- if eq (len .Values.providerAdapters) 0 }}
{{- fail "at least one providerAdapters entry is required" }}
{{- end }}
{{- $appIDs := dict }}
{{- $_ := set $appIDs (include "gwai.controlPlaneName" .) true }}
{{- $_ := set $appIDs (include "gwai.virtualKeyControlPlaneName" .) true }}
{{- $_ := set $appIDs (include "gwai.adminWebUIName" .) true }}
{{- $gatewayNames := dict }}
{{- range $index, $gateway := .Values.gateways }}
{{- if not (regexMatch "^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$" $gateway.name) }}
{{- fail (printf "gateways[%d].name must be a lowercase DNS label" $index) }}
{{- end }}
{{- if hasKey $gatewayNames $gateway.name }}
{{- fail (printf "gateways[%d].name must be unique" $index) }}
{{- end }}
{{- $_ := set $gatewayNames $gateway.name true }}
{{- $gatewayAppID := include "gwai.gatewayName" (dict "root" $ "gateway" $gateway) }}
{{- if hasKey $appIDs $gatewayAppID }}
{{- fail (printf "gateways[%d] generates a duplicate Dapr app ID" $index) }}
{{- end }}
{{- $_ := set $appIDs $gatewayAppID true }}
{{- if not $gateway.image.repository }}
{{- fail (printf "gateways[%d].image.repository is required" $index) }}
{{- end }}
{{- if or (le (int $gateway.replicas) 0) (le (int $gateway.port) 0) (le (int64 $gateway.maxBodyBytes) 0) }}
{{- fail (printf "gateways[%d] replicas, port and maxBodyBytes must be positive" $index) }}
{{- end }}
{{- end }}
{{- $names := dict }}
{{- range $index, $adapter := .Values.providerAdapters }}
{{- if not (regexMatch "^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$" $adapter.name) }}
{{- fail (printf "providerAdapters[%d].name must be a lowercase DNS label" $index) }}
{{- end }}
{{- if hasKey $names $adapter.name }}
{{- fail (printf "providerAdapters[%d].name must be unique" $index) }}
{{- end }}
{{- $_ := set $names $adapter.name true }}
{{- if not (has $adapter.kind (list "anthropic" "openai-chat" "openai-responses" "gemini")) }}
{{- fail (printf "providerAdapters[%d].kind is unsupported" $index) }}
{{- end }}
{{- if not (regexMatch "^[a-z0-9](?:[a-z0-9.-]{0,61}[a-z0-9])?$" $adapter.appID) }}
{{- fail (printf "providerAdapters[%d].appID must be a valid lowercase Dapr app ID" $index) }}
{{- end }}
{{- if hasKey $appIDs $adapter.appID }}
{{- fail (printf "providerAdapters[%d].appID must be unique across every Dapr application" $index) }}
{{- end }}
{{- $_ := set $appIDs $adapter.appID true }}
{{- if not $adapter.image.repository }}
{{- fail (printf "providerAdapters[%d].image.repository is required" $index) }}
{{- end }}
{{- if or (le (int $adapter.replicas) 0) (le (int $adapter.port) 0) (le (int64 $adapter.maxBodyBytes) 0) }}
{{- fail (printf "providerAdapters[%d] replicas, port and maxBodyBytes must be positive" $index) }}
{{- end }}
{{- if hasKey $adapter "defaultMaxOutputTokens" }}
{{- if le (int $adapter.defaultMaxOutputTokens) 0 }}
{{- fail (printf "providerAdapters[%d].defaultMaxOutputTokens must be positive" $index) }}
{{- end }}
{{- end }}
{{- if hasKey $adapter "maxOutputTokens" }}
{{- if lt (int $adapter.maxOutputTokens) 0 }}
{{- fail (printf "providerAdapters[%d].maxOutputTokens must not be negative" $index) }}
{{- end }}
{{- if and (hasKey $adapter "defaultMaxOutputTokens") (gt (int $adapter.maxOutputTokens) 0) (lt (int $adapter.maxOutputTokens) (int $adapter.defaultMaxOutputTokens)) }}
{{- fail (printf "providerAdapters[%d].maxOutputTokens must be zero or at least defaultMaxOutputTokens" $index) }}
{{- end }}
{{- end }}
{{- if not (hasKey $adapter "upstream") }}
{{- fail (printf "providerAdapters[%d].upstream is required" $index) }}
{{- end }}
{{- if not (regexMatch "^https?://[^[:space:]]+$" $adapter.upstream.baseURL) }}
{{- fail (printf "providerAdapters[%d].upstream.baseURL must be an absolute HTTP(S) URL" $index) }}
{{- end }}
{{- if not (regexMatch "^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$" $adapter.upstream.apiVersion) }}
{{- fail (printf "providerAdapters[%d].upstream.apiVersion must be a valid API version token" $index) }}
{{- end }}
{{- if not (hasKey $adapter.upstream "secretRef") }}
{{- fail (printf "providerAdapters[%d].upstream.secretRef is required" $index) }}
{{- end }}
{{- if or (not $adapter.upstream.secretRef.store) (not $adapter.upstream.secretRef.name) (not $adapter.upstream.secretRef.key) }}
{{- fail (printf "providerAdapters[%d].upstream.secretRef store, name and key are required" $index) }}
{{- end }}
{{- if and $adapter.upstream.secretRef.namespace (not (regexMatch "^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$" $adapter.upstream.secretRef.namespace)) }}
{{- fail (printf "providerAdapters[%d].upstream.secretRef.namespace must be empty or a lowercase DNS label" $index) }}
{{- end }}
{{- end }}
