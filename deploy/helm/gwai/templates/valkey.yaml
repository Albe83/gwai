{{- if .Values.valkey.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gwai.valkeyName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  serviceName: {{ include "gwai.valkeyName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "gwai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: valkey
  template:
    metadata:
      labels:
        {{- include "gwai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: valkey
      annotations:
        checksum/valkey-secret: {{ include (print $.Template.BasePath "/valkey-secret.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: {{ printf "%s:%s" .Values.valkey.image.repository .Values.valkey.image.tag }}
          imagePullPolicy: {{ .Values.valkey.image.pullPolicy }}
          args:
            - valkey-server
            - --appendonly
            - "yes"
            - --save
            - "60"
            - "1"
            - --databases
            - {{ .Values.valkey.databases | quote }}
            - --requirepass
            - $(VALKEY_PASSWORD)
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gwai.valkeyAuthSecretName" . }}
                  key: {{ .Values.valkey.auth.secretKey }}
          ports:
            - name: valkey
              containerPort: {{ .Values.valkey.port }}
          livenessProbe:
            tcpSocket:
              port: valkey
          readinessProbe:
            tcpSocket:
              port: valkey
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
  {{- if .Values.valkey.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.valkey.persistence.storageClassName }}
        storageClassName: {{ .Values.valkey.persistence.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.valkey.persistence.size }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gwai.valkeyName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  clusterIP: None
  selector:
    {{- include "gwai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
  ports:
    - name: valkey
      port: {{ .Values.valkey.port }}
      targetPort: valkey
{{- end }}
