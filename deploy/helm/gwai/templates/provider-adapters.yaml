{{- $root := . -}}
{{- range $index, $adapter := .Values.providerAdapters }}
{{- if $index }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gwai.adapterName" (dict "root" $root "adapter" $adapter) }}
  labels:
    {{- include "gwai.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ printf "%s-adapter" $adapter.kind | quote }}
    gwai.dev/provider: {{ $adapter.name | quote }}
spec:
  replicas: {{ $adapter.replicas }}
  selector:
    matchLabels:
      {{- include "gwai.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: {{ printf "%s-adapter" $adapter.kind | quote }}
      gwai.dev/provider: {{ $adapter.name | quote }}
  template:
    metadata:
      labels:
        {{- include "gwai.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ printf "%s-adapter" $adapter.kind | quote }}
        gwai.dev/provider: {{ $adapter.name | quote }}
      annotations:
        checksum/dapr-token-secrets: {{ include (print $root.Template.BasePath "/dapr-token-secrets.yaml") $root | sha256sum }}
        {{- if $root.Values.dapr.enabled }}
        dapr.io/enabled: "true"
        dapr.io/app-id: {{ $adapter.appID | quote }}
        dapr.io/app-port: {{ $adapter.port | quote }}
        dapr.io/app-protocol: http
        dapr.io/config: {{ include "gwai.adapterName" (dict "root" $root "adapter" $adapter) }}
        dapr.io/log-level: {{ $root.Values.dapr.logLevel | quote }}
        dapr.io/log-as-json: "true"
        dapr.io/enable-api-logging: {{ $root.Values.dapr.apiLogging | quote }}
        dapr.io/max-body-size: "16Mi"
        dapr.io/api-token-secret: {{ include "gwai.daprAPISecretName" $root }}
        dapr.io/app-token-secret: {{ include "gwai.appAPISecretName" $root }}
        {{- end }}
        {{- with $root.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "gwai.adapterServiceAccountName" (dict "root" $root "adapter" $adapter) }}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ printf "%s-adapter" $adapter.kind }}
          image: {{ include "gwai.image" (dict "root" $root "repository" $adapter.image.repository) }}
          imagePullPolicy: {{ $root.Values.global.image.pullPolicy }}
          env:
            - name: PORT
              value: {{ $adapter.port | quote }}
            - name: GWAI_PROVIDER_STATE_STORE
              value: {{ $root.Values.dapr.stateStores.providers.name | quote }}
            - name: GWAI_PROVIDER_SLUG
              value: {{ $adapter.providerSlug | quote }}
            - name: GWAI_ADAPTER_APP_ID
              value: {{ $adapter.appID | quote }}
            - name: GWAI_MAX_BODY_BYTES
              value: {{ int64 $adapter.maxBodyBytes | quote }}
            - name: GWAI_PROVIDER_TIMEOUT
              value: {{ $adapter.providerTimeout | quote }}
            {{- if hasKey $adapter "defaultMaxOutputTokens" }}
            - name: GWAI_DEFAULT_MAX_OUTPUT_TOKENS
              value: {{ int64 $adapter.defaultMaxOutputTokens | quote }}
            {{- end }}
            {{- if hasKey $adapter "maxOutputTokens" }}
            - name: GWAI_MAX_OUTPUT_TOKENS
              value: {{ int64 $adapter.maxOutputTokens | quote }}
            {{- end }}
            - name: DAPR_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "gwai.daprAPISecretName" $root }}
                  key: token
            - name: APP_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "gwai.appAPISecretName" $root }}
                  key: token
          ports:
            - name: http
              containerPort: {{ $adapter.port }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml $adapter.resources | nindent 12 }}
      {{- with $root.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
