apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gwai.fullname" . }}-openai-gateway
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
    app.kubernetes.io/component: openai-gateway
spec:
  replicas: {{ .Values.openaiGateway.replicas }}
  selector:
    matchLabels:
      {{- include "gwai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: openai-gateway
  template:
    metadata:
      labels:
        {{- include "gwai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: openai-gateway
      annotations:
        checksum/dapr-token-secrets: {{ include (print $.Template.BasePath "/dapr-token-secrets.yaml") . | sha256sum }}
        {{- if .Values.dapr.enabled }}
        dapr.io/enabled: "true"
        dapr.io/app-id: {{ include "gwai.fullname" . }}-openai-gateway
        dapr.io/app-port: {{ .Values.openaiGateway.port | quote }}
        dapr.io/app-protocol: http
        dapr.io/config: {{ include "gwai.fullname" . }}-openai-gateway
        dapr.io/log-level: {{ .Values.dapr.logLevel | quote }}
        dapr.io/log-as-json: "true"
        dapr.io/enable-api-logging: {{ .Values.dapr.apiLogging | quote }}
        dapr.io/disable-builtin-k8s-secret-store: "true"
        dapr.io/max-body-size: "16Mi"
        dapr.io/api-token-secret: {{ include "gwai.daprAPISecretName" . }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "gwai.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openai-gateway
          image: {{ include "gwai.image" (dict "root" . "repository" .Values.images.openaiGateway.repository) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            - name: PORT
              value: {{ .Values.openaiGateway.port | quote }}
            - name: GWAI_STATE_STORE
              value: {{ .Values.dapr.stateStoreName | quote }}
            - name: GWAI_MAX_BODY_BYTES
              value: {{ int64 .Values.openaiGateway.maxBodyBytes | quote }}
            - name: GWAI_REQUEST_TIMEOUT
              value: {{ .Values.openaiGateway.requestTimeout | quote }}
            - name: DAPR_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "gwai.daprAPISecretName" . }}
                  key: token
          ports:
            - name: http
              containerPort: {{ .Values.openaiGateway.port }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.openaiGateway.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gwai.fullname" . }}-openai-gateway
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
    app.kubernetes.io/component: openai-gateway
spec:
  type: {{ .Values.openaiGateway.service.type }}
  selector:
    {{- include "gwai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: openai-gateway
  ports:
    - name: http
      port: {{ .Values.openaiGateway.service.port }}
      targetPort: http
