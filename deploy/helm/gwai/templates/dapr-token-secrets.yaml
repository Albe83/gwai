{{- if not .Values.security.daprAPI.existingSecret }}
{{- $secretName := printf "%s-dapr-api-token" (include "gwai.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $token := randAlphaNum 48 | b64enc }}
{{- if and $existing (hasKey $existing.data "token") }}
{{- $token = index $existing.data "token" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ $token | quote }}
{{- end }}
{{- if and (not .Values.security.daprAPI.existingSecret) (not .Values.security.appAPI.existingSecret) }}
---
{{- end }}
{{- if not .Values.security.appAPI.existingSecret }}
{{- $secretName := printf "%s-app-api-token" (include "gwai.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $token := randAlphaNum 48 | b64enc }}
{{- if and $existing (hasKey $existing.data "token") }}
{{- $token = index $existing.data "token" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ $token | quote }}
{{- end }}
