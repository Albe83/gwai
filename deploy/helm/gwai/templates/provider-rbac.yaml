{{- $root := . -}}
{{- range $index, $adapter := .Values.providerAdapters }}
{{- $secretNamespace := default $root.Release.Namespace $adapter.upstream.secretRef.namespace }}
{{- if $index }}
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gwai.adapterSecretsRoleName" (dict "root" $root "adapter" $adapter) }}
  namespace: {{ $secretNamespace | quote }}
  labels:
    {{- include "gwai.labels" $root | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ $adapter.upstream.secretRef.name | quote }}
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "gwai.adapterSecretsRoleName" (dict "root" $root "adapter" $adapter) }}
  namespace: {{ $secretNamespace | quote }}
  labels:
    {{- include "gwai.labels" $root | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "gwai.adapterServiceAccountName" (dict "root" $root "adapter" $adapter) }}
    namespace: {{ $root.Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "gwai.adapterSecretsRoleName" (dict "root" $root "adapter" $adapter) }}
{{- end }}
