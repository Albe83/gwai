{{- if .Values.anthropicAdapter.secretNames }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gwai.fullname" . }}-anthropic-secrets
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- toYaml .Values.anthropicAdapter.secretNames | nindent 6 }}
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "gwai.fullname" . }}-anthropic-secrets
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "gwai.anthropicServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "gwai.fullname" . }}-anthropic-secrets
{{- end }}
