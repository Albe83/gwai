{{- if and .Values.valkey.enabled (not .Values.valkey.auth.existingSecret) }}
{{- $secretName := include "gwai.valkeyAuthSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := randAlphaNum 48 | b64enc }}
{{- if and $existing (hasKey $existing.data .Values.valkey.auth.secretKey) }}
{{- $password = index $existing.data .Values.valkey.auth.secretKey }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.valkey.auth.secretKey }}: {{ $password | quote }}
{{- end }}
