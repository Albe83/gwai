{{- if .Values.dapr.enabled }}
{{- $root := . -}}
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: {{ include "gwai.controlPlaneName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
spec:
  tracing:
    samplingRate: {{ .Values.dapr.tracingSamplingRate | quote }}
  api:
    allowed:
      - name: invoke
        version: v1.0
        protocol: http
      - name: state
        version: v1.0
        protocol: http
  accessControl:
    defaultAction: deny
    trustDomain: public
    policies:
      - appId: {{ include "gwai.adminWebUIName" . }}
        namespace: {{ .Release.Namespace }}
        trustDomain: public
        defaultAction: deny
        operations:
          - name: /v1/users
            # Dapr 1.18 returns a collection ACL node as a prefix match before
            # consulting its item wildcard. Include item verbs here as a
            # compatibility superset; the Go mux rejects invalid combinations.
            httpVerb: ["GET", "POST", "PUT", "DELETE"]
            action: allow
          - name: /v1/users/*
            httpVerb: ["GET", "PUT", "DELETE"]
            action: allow
          - name: /v1/providers
            httpVerb: ["GET", "POST", "PUT", "DELETE"]
            action: allow
          - name: /v1/providers/*
            httpVerb: ["GET", "PUT", "DELETE"]
            action: allow
---
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: {{ include "gwai.virtualKeyControlPlaneName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
spec:
  tracing:
    samplingRate: {{ .Values.dapr.tracingSamplingRate | quote }}
  api:
    allowed:
      - name: invoke
        version: v1.0
        protocol: http
      - name: state
        version: v1.0
        protocol: http
  accessControl:
    defaultAction: deny
    trustDomain: public
    policies:
      - appId: {{ include "gwai.controlPlaneName" . }}
        namespace: {{ .Release.Namespace }}
        trustDomain: public
        defaultAction: deny
        operations:
          - name: /internal/v1/subjects/sync
            httpVerb: ["POST"]
            action: allow
          - name: /internal/v1/subjects/fence
            httpVerb: ["POST"]
            action: allow
      - appId: {{ include "gwai.adminWebUIName" . }}
        namespace: {{ .Release.Namespace }}
        trustDomain: public
        defaultAction: deny
        operations:
          - name: /v1/virtual-keys
            httpVerb: ["GET", "POST", "PUT", "DELETE"]
            action: allow
          - name: /v1/virtual-keys/*
            httpVerb: ["GET", "PUT", "DELETE"]
            action: allow
---
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: {{ include "gwai.adminWebUIName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
spec:
  tracing:
    samplingRate: {{ .Values.dapr.tracingSamplingRate | quote }}
  api:
    allowed:
      - name: invoke
        version: v1.0
        protocol: http
  accessControl:
    defaultAction: deny
    trustDomain: public
{{- range $adapter := .Values.providerAdapters }}
---
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: {{ include "gwai.adapterName" (dict "root" $root "adapter" $adapter) }}
  labels:
    {{- include "gwai.labels" $root | nindent 4 }}
spec:
  tracing:
    samplingRate: {{ $root.Values.dapr.tracingSamplingRate | quote }}
  api:
    allowed:
      - name: invoke
        version: v1.0
        protocol: http
      - name: state
        version: v1.0
        protocol: http
      - name: secrets
        version: v1.0
        protocol: http
  secrets:
    scopes:
      - storeName: kubernetes
        defaultAccess: deny
        allowedSecrets:
          {{- toYaml $adapter.secretNames | nindent 10 }}
  accessControl:
    defaultAction: deny
    trustDomain: public
    policies:
      {{- range $gateway := $root.Values.gateways }}
      - appId: {{ include "gwai.gatewayName" (dict "root" $root "gateway" $gateway) }}
        namespace: {{ $root.Release.Namespace }}
        trustDomain: public
        defaultAction: deny
        operations:
          - name: /v1/generate
            httpVerb: ["POST"]
            action: allow
      {{- end }}
{{- end }}
{{- range $gateway := .Values.gateways }}
---
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: {{ include "gwai.gatewayName" (dict "root" $root "gateway" $gateway) }}
  labels:
    {{- include "gwai.labels" $root | nindent 4 }}
spec:
  tracing:
    samplingRate: {{ $root.Values.dapr.tracingSamplingRate | quote }}
  api:
    allowed:
      - name: invoke
        version: v1.0
        protocol: http
      - name: state
        version: v1.0
        protocol: http
{{- end }}
{{- end }}
