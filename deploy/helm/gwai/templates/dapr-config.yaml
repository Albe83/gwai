{{- if .Values.dapr.enabled }}
{{- $root := . -}}
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: {{ include "gwai.fullname" . }}-control-plane
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
spec:
  tracing:
    samplingRate: {{ .Values.dapr.tracingSamplingRate | quote }}
  api:
    allowed:
      - name: state
        version: v1.0
        protocol: http
  accessControl:
    defaultAction: deny
    trustDomain: public
{{- range $adapter := .Values.anthropicAdapters }}
---
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: {{ include "gwai.anthropicAdapterName" (dict "root" $root "adapter" $adapter) }}
  labels:
    {{- include "gwai.labels" $root | nindent 4 }}
spec:
  tracing:
    samplingRate: {{ $root.Values.dapr.tracingSamplingRate | quote }}
  api:
    allowed:
      - name: invoke
        version: v1.0
        protocol: http
      - name: state
        version: v1.0
        protocol: http
      - name: secrets
        version: v1.0
        protocol: http
  secrets:
    scopes:
      - storeName: kubernetes
        defaultAccess: deny
        allowedSecrets:
          {{- toYaml $adapter.secretNames | nindent 10 }}
  accessControl:
    defaultAction: deny
    trustDomain: public
    policies:
      - appId: {{ include "gwai.fullname" $root }}-openai-gateway
        namespace: {{ $root.Release.Namespace }}
        trustDomain: public
        defaultAction: deny
        operations:
          - name: /v1/generate
            httpVerb: ["POST"]
            action: allow
{{- end }}
---
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: {{ include "gwai.fullname" . }}-openai-gateway
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
spec:
  tracing:
    samplingRate: {{ .Values.dapr.tracingSamplingRate | quote }}
  api:
    allowed:
      - name: invoke
        version: v1.0
        protocol: http
      - name: state
        version: v1.0
        protocol: http
{{- end }}
