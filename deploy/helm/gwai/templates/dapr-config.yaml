{{- if .Values.dapr.enabled }}
{{- $root := . -}}
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: {{ include "gwai.fullname" . }}-control-plane
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
spec:
  tracing:
    samplingRate: {{ .Values.dapr.tracingSamplingRate | quote }}
  api:
    allowed:
      - name: state
        version: v1.0
        protocol: http
  accessControl:
    defaultAction: deny
    trustDomain: public
{{- range $adapter := .Values.providerAdapters }}
---
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: {{ include "gwai.adapterName" (dict "root" $root "adapter" $adapter) }}
  labels:
    {{- include "gwai.labels" $root | nindent 4 }}
spec:
  tracing:
    samplingRate: {{ $root.Values.dapr.tracingSamplingRate | quote }}
  api:
    allowed:
      - name: invoke
        version: v1.0
        protocol: http
      - name: state
        version: v1.0
        protocol: http
      - name: secrets
        version: v1.0
        protocol: http
  secrets:
    scopes:
      - storeName: kubernetes
        defaultAccess: deny
        allowedSecrets:
          {{- toYaml $adapter.secretNames | nindent 10 }}
  accessControl:
    defaultAction: deny
    trustDomain: public
    policies:
      {{- range $gateway := $root.Values.gateways }}
      - appId: {{ include "gwai.gatewayName" (dict "root" $root "gateway" $gateway) }}
        namespace: {{ $root.Release.Namespace }}
        trustDomain: public
        defaultAction: deny
        operations:
          - name: /v1/generate
            httpVerb: ["POST"]
            action: allow
      {{- end }}
{{- end }}
{{- range $gateway := .Values.gateways }}
---
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: {{ include "gwai.gatewayName" (dict "root" $root "gateway" $gateway) }}
  labels:
    {{- include "gwai.labels" $root | nindent 4 }}
spec:
  tracing:
    samplingRate: {{ $root.Values.dapr.tracingSamplingRate | quote }}
  api:
    allowed:
      - name: invoke
        version: v1.0
        protocol: http
      - name: state
        version: v1.0
        protocol: http
{{- end }}
{{- end }}
