{{- if not .Values.admin.existingSecret }}
{{- $secretName := printf "%s-admin" (include "gwai.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $token := randAlphaNum 48 | b64enc }}
{{- if and $existing (hasKey $existing.data .Values.admin.secretKey) }}
{{- $token = index $existing.data .Values.admin.secretKey }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.admin.secretKey }}: {{ $token | quote }}
{{- end }}

