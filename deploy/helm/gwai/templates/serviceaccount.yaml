{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gwai.serviceAccountName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gwai.anthropicServiceAccountName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
    app.kubernetes.io/component: anthropic-adapter
automountServiceAccountToken: true
