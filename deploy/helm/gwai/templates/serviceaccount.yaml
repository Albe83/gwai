{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gwai.serviceAccountName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- $root := . -}}
{{- range $adapter := .Values.anthropicAdapters }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gwai.anthropicServiceAccountName" (dict "root" $root "adapter" $adapter) }}
  labels:
    {{- include "gwai.labels" $root | nindent 4 }}
    app.kubernetes.io/component: anthropic-adapter
    gwai.dev/provider: {{ $adapter.name | quote }}
automountServiceAccountToken: true
{{- end }}
