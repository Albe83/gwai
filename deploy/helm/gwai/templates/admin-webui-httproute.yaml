{{- if .Values.adminWebUI.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "gwai.adminWebUIName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin-webui
  {{- with .Values.adminWebUI.httpRoute.annotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key | quote }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.adminWebUI.httpRoute.parentRefs }}
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .name | quote }}
      {{- with .namespace }}
      namespace: {{ . | quote }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . | quote }}
      {{- end }}
    {{- end }}
  {{- with .Values.adminWebUI.httpRoute.hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "gwai.adminWebUIName" . }}
          port: {{ .Values.adminWebUI.service.port }}
{{- end }}
