apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gwai.adminWebUIName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin-webui
spec:
  replicas: {{ .Values.adminWebUI.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "gwai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin-webui
  template:
    metadata:
      labels:
        {{- include "gwai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin-webui
      annotations:
        checksum/admin-secret: {{ include (print $.Template.BasePath "/admin-secret.yaml") . | sha256sum }}
        checksum/dapr-token-secrets: {{ include (print $.Template.BasePath "/dapr-token-secrets.yaml") . | sha256sum }}
        {{- if .Values.dapr.enabled }}
        dapr.io/enabled: "true"
        dapr.io/app-id: {{ include "gwai.adminWebUIName" . }}
        dapr.io/app-port: {{ .Values.adminWebUI.port | quote }}
        dapr.io/app-protocol: http
        dapr.io/config: {{ include "gwai.adminWebUIName" . }}
        dapr.io/log-level: {{ .Values.dapr.logLevel | quote }}
        dapr.io/log-as-json: "true"
        dapr.io/enable-api-logging: {{ .Values.dapr.apiLogging | quote }}
        dapr.io/disable-builtin-k8s-secret-store: "true"
        dapr.io/api-token-secret: {{ include "gwai.daprAPISecretName" . }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.adminWebUI.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "gwai.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin-webui
          image: {{ include "gwai.image" (dict "root" . "repository" .Values.images.adminWebUI.repository) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            - name: PORT
              value: {{ .Values.adminWebUI.port | quote }}
            - name: GWAI_RESOURCE_CONTROL_APP_ID
              value: {{ include "gwai.controlPlaneName" . | quote }}
            - name: GWAI_VIRTUAL_KEY_CONTROL_APP_ID
              value: {{ include "gwai.virtualKeyControlPlaneName" . | quote }}
            - name: GWAI_ADMIN_UI_SESSION_TTL
              value: {{ printf "%ds" (int .Values.adminWebUI.sessionTTLSeconds) | quote }}
            - name: GWAI_REQUEST_TIMEOUT
              value: {{ printf "%ds" (int .Values.adminWebUI.requestTimeoutSeconds) | quote }}
            - name: GWAI_ADMIN_UI_SECURE_COOKIES
              value: {{ .Values.adminWebUI.secureCookies | quote }}
            - name: GWAI_MAX_BODY_BYTES
              value: {{ int64 .Values.adminWebUI.maxBodyBytes | quote }}
            - name: GWAI_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "gwai.adminSecretName" . }}
                  key: {{ .Values.admin.secretKey }}
            - name: DAPR_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "gwai.daprAPISecretName" . }}
                  key: token
          ports:
            - name: http
              containerPort: {{ .Values.adminWebUI.port }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.adminWebUI.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gwai.adminWebUIName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin-webui
spec:
  type: {{ .Values.adminWebUI.service.type }}
  selector:
    {{- include "gwai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: admin-webui
  ports:
    - name: http
      port: {{ .Values.adminWebUI.service.port }}
      targetPort: http
