{{- if .Values.dapr.enabled }}
apiVersion: dapr.io/v1alpha1
kind: Resiliency
metadata:
  name: {{ include "gwai.resiliencyName" . }}
  labels:
    {{- include "gwai.labels" . | nindent 4 }}
scopes:
  {{- range $gateway := .Values.gateways }}
  - {{ include "gwai.gatewayName" (dict "root" $ "gateway" $gateway) }}
  {{- end }}
  {{- range $adapter := .Values.providerAdapters }}
  - {{ $adapter.appID | quote }}
  {{- end }}
spec:
  policies:
    retries:
      # Kubernetes endpoint rotation can outlive Dapr's default three retries.
      # This reserved policy overrides only sidecar-to-sidecar connection errors.
      DaprBuiltInServiceRetries:
        policy: constant
        duration: 1s
        maxRetries: 40
  targets:
    apps:
      {{- range $adapter := .Values.providerAdapters }}
      {{ $adapter.appID | quote }}:
        retry: DaprBuiltInServiceRetries
      {{- end }}
{{- end }}
